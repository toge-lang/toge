<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="lexer.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toge V1 ALPHA</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Fira+Code:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-page:             #4a4e5e;
      --bg-card:             #5a5f72;
      --bg-editor:           #1e2233;
      --bg-tabbar:           #252a3a;
      --bg-logo-base:        #3a3d4a;
      --color-border:        #2e3347;
      --color-spike:         #9aa0b0;
      --color-accent:        #6ee870;
      --color-accent-shadow: #2a5a28;
      --color-linenum:       #4a5068;
      --color-code:          #e0e4f0;
      --color-tabname:       #d0d4e8;
      --color-scrollbar:     #3a3f55;
      --color-purple:        #8b5cf6;
      --color-purple-hover:  #7c3aed;
      --color-green:         #22c55e;
      --color-green-hover:   #16a34a;
      --color-white:         #ffffff;
      --color-shadow:        rgba(0, 0, 0, 0.35);
      --font-mono:           'Fira Code', monospace;
      --font-display:        'Poppins', sans-serif;
      --font-ui:             'Fira Code', system-ui, sans-serif;
      --radius-card:         18px;
      --radius-panel:        14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      background: var(--bg-page);
      font-family: var(--font-mono);
    }
    main {
      width: min(860px, 100%);
    }
    .card {
      background: var(--bg-card);
      border-radius: var(--radius-card);
      padding: 28px 32px 36px;
      box-shadow: 0 8px 32px var(--color-shadow);
      border: 1px solid transparent;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .logo {
      position: relative;
      width: 108px;
      height: 68px;
      flex-shrink: 0;
    }
    .logo-base {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      height: 18px;
      background: var(--bg-logo-base);
      border-radius: 2px;
    }
    .spike {
      position: absolute;
      bottom: 18px;
      width: 0;
      height: 0;
      border-left: solid transparent;
      border-right: solid transparent;
      border-bottom: solid var(--color-spike);
    }
    .spike.s1 { border-left-width: 18px; border-right-width: 18px; border-bottom-width: 50px; left: 0px; }
    .spike.s2 { border-left-width: 18px; border-right-width: 18px; border-bottom-width: 50px; left: 36px; }
    .spike.s3 { border-left-width: 18px; border-right-width: 18px; border-bottom-width: 50px; left: 72px; }
    .title {
      font-family: var(--font-display);
      font-size: 3.2rem;
      letter-spacing: 3px;
      color: var(--color-accent);
      text-shadow: 2px 2px 0 var(--color-accent-shadow);
      line-height: 1;
      flex: 1;
    }
    .btn-docs,
    .btn-run {
      border: none;
      border-radius: 999px;
      font-family: var(--font-ui);
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.4px;
      white-space: nowrap;
      color: var(--color-white);
    }
    @media (prefers-reduced-motion: no-preference) {
      .btn-docs,
      .btn-run {
        transition: background-color 0.2s, transform 0.1s;
      }
      .btn-docs:active,
      .btn-run:active { transform: scale(0.97); }
    }
    .btn-docs:focus-visible,
    .btn-run:focus-visible {
      outline: 3px solid var(--color-accent);
      outline-offset: 3px;
    }
    .btn-docs {
      background: var(--color-purple);
      padding: 10px 24px;
      font-size: 1rem;
      will-change: transform;
      text-decoration: none;
    }
    .btn-docs:hover { background-color: var(--color-purple-hover); }
    .editor-panel {
      background: var(--bg-editor);
      border-radius: var(--radius-panel);
      margin-bottom: 22px;
    }
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--bg-tabbar);
      border-bottom: 1px solid var(--color-border);
      border-radius: var(--radius-panel) var(--radius-panel) 0 0;
    }
    .tab-icon { font-size: 1.2rem; }
    .tab-name {
      color: var(--color-tabname);
      font-size: 0.95rem;
    }
    .code-wrapper {
      display: flex;
      height: 290px;
      border-radius: 0 0 var(--radius-panel) var(--radius-panel);
      overflow: hidden;
    }
    .line-numbers {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      padding: 14px 10px 14px 14px;
      background: var(--bg-editor);
      color: var(--color-linenum);
      font-size: 0.88rem;
      user-select: none;
      min-width: 42px;
      overflow-y: scroll;
      scrollbar-width: none;
    }
    .line-numbers::-webkit-scrollbar { display: none; }
    .line-numbers span { display: block; line-height: 1.7; }
    .code-area {
      flex: 1;
      background: var(--bg-editor);
      color: var(--color-code);
      border: none;
      resize: none;
      margin: 0;
      font-family: var(--font-mono);
      font-size: 0.88rem;
      line-height: 1.7;
      padding: 14px 14px 14px 4px;
      overflow-y: auto;
      overflow-x: auto;
      white-space: pre;
      scrollbar-width: thin;
      scrollbar-color: var(--color-scrollbar) transparent;
    }
    .code-area:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: -2px;
    }
    .code-area:focus { outline: none; }
    .code-area::-webkit-scrollbar       { width: 7px; height: 7px; }
    .code-area::-webkit-scrollbar-track { background: transparent; }
    .code-area::-webkit-scrollbar-thumb { background: var(--color-scrollbar); border-radius: 4px; }
    .btn-run {
      background: var(--color-green);
      padding: 12px 36px;
      font-size: 1.05rem;
      display: block;
      will-change: transform;
    }
    .btn-run:hover { background-color: var(--color-green-hover); }
  </style>
</head>
<body>
<main>
  <div class="card">
    <div class="header">
      <div class="logo" aria-label="Toge logo" role="img">
        <div class="spike s1" aria-hidden="true"></div>
        <div class="spike s2" aria-hidden="true"></div>
        <div class="spike s3" aria-hidden="true"></div>
        <div class="logo-base" aria-hidden="true"></div>
      </div>
      <h1 class="title">Toge</h1>
      <a href="https://github.com/LoukasTheUhhh/toge" target="_blank" rel="noopener noreferrer" class="btn-docs">Documentation</a>
    </div>
    <div class="editor-panel">
      <div class="tab-bar">
        <span class="tab-icon" aria-hidden="true">📄</span>
        <span class="tab-name">main.toge</span>
      </div>
      <div class="code-wrapper">
        <div class="line-numbers" id="lineNumbers" aria-hidden="true"></div>
        <textarea
          class="code-area"
          id="codeArea"
          spellcheck="false"
          autocorrect="off"
          autocapitalize="none"
          autocomplete="off"
          aria-label="Code editor"
        >wrt("Hello World!")</textarea>
      </div>
    </div>
    <button class="btn-run" type="button">Run</button>
  </div>
</main>
<script defer>
  const lineNumbers = document.getElementById('lineNumbers');
  const fragment = document.createDocumentFragment();
  for (let i = 1; i <= 99; i++) {
    const span = document.createElement('span');
    span.textContent = i;
    fragment.appendChild(span);
  }
  lineNumbers.appendChild(fragment);
  const codeArea = document.getElementById('codeArea');
  let rafPending = false;
  codeArea.addEventListener('scroll', () => {
    if (rafPending) return;
    rafPending = true;
    requestAnimationFrame(() => {
      lineNumbers.scrollTop = codeArea.scrollTop;
      rafPending = false;
    });
  }, { passive: true });
  function getRemainingLines(selStart, selEnd) {
    const before = codeArea.value.slice(0, selStart);
    const after  = codeArea.value.slice(selEnd);
    return 99 - (before.split('\n').length + after.split('\n').length - 1);
  }
  codeArea.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      document.execCommand('insertText', false, '  ');
      return;
    }
    if (e.key === 'Enter') {
      if (getRemainingLines(codeArea.selectionStart, codeArea.selectionEnd) <= 0) {
        e.preventDefault();
      }
    }
  });
  codeArea.addEventListener('paste', (e) => {
    e.preventDefault();
    const pasted = (e.clipboardData || window.clipboardData)?.getData('text') ?? '';
    if (!pasted) return;
    const remaining = getRemainingLines(codeArea.selectionStart, codeArea.selectionEnd);
    if (remaining <= 0) return;
    document.execCommand('insertText', false, pasted.split('\n').slice(0, remaining).join('\n'));
  });
  codeArea.addEventListener('dragover', (e) => e.preventDefault(), { passive: false });
  codeArea.addEventListener('drop', (e) => {
    e.preventDefault();
    const dropped = e.dataTransfer?.getData('text') ?? '';
    if (!dropped) return;
    let pos = codeArea.value.length;
    if (document.caretPositionFromPoint) {
      const cp = document.caretPositionFromPoint(e.clientX, e.clientY);
      if (cp) pos = cp.offset;
    } else if (document.caretRangeFromPoint) {
      const range = document.caretRangeFromPoint(e.clientX, e.clientY);
      if (range) pos = range.startOffset;
    }
    codeArea.focus();
    codeArea.setSelectionRange(pos, pos);
    const remaining = getRemainingLines(pos, pos);
    if (remaining <= 0) return;
    document.execCommand('insertText', false, dropped.split('\n').slice(0, remaining).join('\n'));
  });
</script>
</body>
</html>
